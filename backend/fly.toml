app = "stusta-gym-backend"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8090
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "pb_data"
  destination = "/pb/pb_data"

[vm]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
